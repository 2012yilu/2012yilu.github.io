<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 原有的头部信息 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索结果 - 清浅资源搜索</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 原有的样式 */
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="logo">清浅资源搜索</a>
        <form action="search.html" method="get">
            <input type="text" name="q" class="search-box" placeholder="输入搜索关键词...">
        </form>
    </div>

    <div id="search-results">
        <div class="search-stats" id="search-stats"></div>
        <div id="results"></div>
    </div>

    <!-- 添加用户状态栏 -->
    <div class="user-status">
        <button id="login-button" class="login-button">登录或注册</button>
        <span id="username" class="username" style="display: none;"></span>
    </div>

    <script>
        const clientId = 'YOUR_CLIENT_ID';
        const redirectUri = 'https://yourdomain.com/callback.html';
        const authUrl = `https://github.com/login/oauth/authorize?client_id=${clientId}&redirect_uri=${redirectUri}`;

        const loginButton = document.getElementById('login-button');
        const usernameSpan = document.getElementById('username');

        const token = localStorage.getItem('github_token');
        if (token) {
            loginButton.style.display = 'none';
            usernameSpan.style.display = 'inline';
            // 这里可以调用 API 获取用户名并显示
            fetch('https://api.github.com/user', {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            })
              .then(response => response.json())
              .then(data => {
                    usernameSpan.textContent = data.login;
                });
        } else {
            loginButton.addEventListener('click', () => {
                window.location.href = authUrl;
            });
        }

        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q') || '';
        document.querySelector('.search-box').value = query;
        
        // 显示搜索统计
        document.getElementById('search-stats').textContent = 
            query ? `搜索 "${query}" 的结果` : '请输入搜索关键词';
        
        fetch('/data/articles.json')
            .then(response => response.json())
            .then(articles => {
                const results = query ? 
                    articles.filter(a => 
                        a.title.includes(query) || 
                        a.content.includes(query) ||
                        a.summary.includes(query)
                    ) : [];
                
                document.getElementById('search-stats').textContent = 
                    query ? `找到 ${results.length} 条关于 "${query}" 的结果` : '';
                
                const resultsHTML = results.length ? 
                    results.map(article => `
                        <div class="result">
                            <a href="article.html?id=${article.slug}" class="result-title">
                                ${article.title}
                            </a>
                            <div class="result-url">
                                ${window.location.hostname}/article.html?id=${article.slug}
                            </div>
                            <div class="result-snippet">
                                ${article.summary}
                            </div>
                        </div>
                    `).join('') : 
                    '<div class="no-results">没有找到相关结果</div>';
                
                document.getElementById('results').innerHTML = resultsHTML;
            });
    </script>
</body>
</html>
