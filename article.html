<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 原有的头部信息 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章加载中 - 清浅资源搜索</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="header">
        <a href="/" class="logo">清浅资源搜索</a>
        <form action="/search.html" method="get">
            <input type="text" name="q" class="search-box" placeholder="输入搜索关键词...">
        </form>
    </div>

    <div class="article-container" id="article-container">
        <div class="loading">正在加载文章...</div>
    </div>

    <!-- 添加用户状态栏 -->
    <div class="user-status">
        <button id="login-button" class="login-button">登录或注册</button>
        <span id="username" class="username" style="display: none;"></span>
    </div>

    <script>
        const clientId = 'Ov23liwKU8UwYXFIJCco';
        const redirectUri = 'https://yourdomain.com/callback.html';
        const authUrl = `https://github.com/login/oauth/authorize?client_id=${clientId}&redirect_uri=${redirectUri}`;

        const loginButton = document.getElementById('login-button');
        const usernameSpan = document.getElementById('username');

        const token = localStorage.getItem('github_token');
        if (token) {
            loginButton.style.display = 'none';
            usernameSpan.style.display = 'inline';
            // 这里可以调用 API 获取用户名并显示
            fetch('https://api.github.com/user', {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            })
              .then(response => response.json())
              .then(data => {
                    usernameSpan.textContent = data.login;
                });
        } else {
            loginButton.addEventListener('click', () => {
                window.location.href = authUrl;
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('article-container');
            const slug = new URLSearchParams(window.location.search).get('id');
            
            if (!slug) {
                container.innerHTML = `
                    <div class="error">
                        <h2>文章参数错误</h2>
                        <p>缺少文章ID参数</p>
                        <a href="/search.html">返回搜索页</a>
                    </div>
                `;
                return;
            }
            
            fetch('/data/articles.json')
                .then(response => {
                    if (!response.ok) throw new Error('网络响应错误');
                    return response.json();
                })
                .then(articles => {
                    const article = articles.find(a => a.slug === slug);
                    if (!article) throw new Error('文章不存在');
                    
                    document.title = `${article.title} - 清浅资源搜索`;
                    container.innerHTML = `
                        <h1>${article.title}</h1>
                        <div class="article-meta">发布日期: ${article.date}</div>
                        <div class="article-content">${article.content}</div>
                        <a href="/search.html" class="back-link">← 返回搜索结果</a>
                    `;
                    
                    // 设置搜索框的值（如果有）
                    const query = new URLSearchParams(window.location.search).get('q');
                    if (query) document.querySelector('.search-box').value = query;
                })
                .catch(error => {
                    container.innerHTML = `
                        <div class="error">
                            <h2>加载文章失败</h2>
                            <p>${error.message}</p>
                            <a href="/search.html">返回搜索页</a>
                        </div>
                    `;
                });
        });
    </script>
</body>
</html>
