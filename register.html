<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>注册 - 我的网站</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .error { color: red; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>新用户注册</h1>
        <form id="registerForm">
            <input type="text" id="newUsername" placeholder="用户名" required>
            <input type="password" id="newPassword" placeholder="密码" required>
            <button type="submit">注册</button>
        </form>
        <p>已有账号？ <a href="/login.html">立即登录</a></p>
        <div id="errorMsg" class="error"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            setTimeout(() => {
                document.getElementById('errorMsg').textContent = '';
            }, 5000);
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value.trim();
            
            if (!username || !password) {
                showError('用户名和密码不能为空');
                return;
            }

            try {
                const users = await window.auth.getUsers();
                
                if (users.some(u => u.username === username)) {
                    showError('用户名已存在');
                    return;
                }

                const salt = bcrypt.genSaltSync(10);
                const hash = bcrypt.hashSync(password, salt);
                
                users.push({ username, password: hash });
                await window.auth.saveUsers(users);
                
                localStorage.setItem('currentUser', username);
                window.location.href = '/';
            } catch (error) {
                console.error('Registration error:', error);
                showError(`注册失败: ${error.message}`);
            }
        });
    </script>
</body>
</html>
