<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Security-Policy" 
      content="default-src 'self' https://github.com https://api.github.com;
              script-src 'self' 'unsafe-inline';
              style-src 'self' 'unsafe-inline';
              img-src 'self' https://avatars.githubusercontent.com">
    <title>处理授权...</title>
    <script>
        async function handleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            
            // 验证state参数
            const storedState = sessionStorage.getItem('oauth_state');
            if (urlParams.get('state') !== storedState) {
                window.location.href = '/error.html?code=invalid_state';
                return;
            }

            try {
                // 获取访问令牌
                const response = await fetch('https://github.com/login/oauth/access_token', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        client_id: 'Ov23liXfepzPgqi56IJT',
                        client_secret: '7c0fbe1a8a9811315e7affb4bb2cdd2f27bfd689',
                        code: urlParams.get('code'),
                        redirect_uri: window.location.origin + '/auth-callback.html',
                        code_verifier: sessionStorage.getItem('code_verifier')
                    })
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error_description);

                // 存储访问令牌
                sessionStorage.setItem('gh_access_token', data.access_token);
                
                // 获取用户信息
                const userRes = await fetch('https://api.github.com/user', {
                    headers: { 'Authorization': `Bearer ${data.access_token}` }
                });
                const userData = await userRes.json();
                
                // 初始化用户记录
                await initializeUser(userData.login);
                
                window.location.href = '/dashboard.html';
            } catch (error) {
                console.error('授权流程失败:', error);
                window.location.href = '/error.html?code=auth_failed';
            }
        }

        async function initializeUser(username) {
            // 检查是否为新用户
            const gistsRes = await fetch(`https://api.github.com/users/${username}/gists`);
            const hasProfile = (await gistsRes.json()).some(gist => 
                gist.description === 'user_profile'
            );

            if (!hasProfile) {
                // 创建用户档案
                await fetch('https://api.github.com/gists', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${sessionStorage.getItem('gh_access_token')}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        description: "user_profile",
                        public: false,
                        files: {
                            "profile.json": {
                                content: JSON.stringify({
                                    created_at: new Date().toISOString(),
                                    last_login: new Date().toISOString(),
                                    settings: {}
                                })
                            }
                        }
                    })
                });
            }
        }

        handleCallback();
    </script>
</head>
<body>
    <div class="loading">正在验证授权...</div>
</body>
</html>
