<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 原有的头部信息 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清浅资源搜索</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 原有的样式 */
    </style>
</head>
<body>
    <div class="main-container">
        <!-- 原有的搜索框和标题 -->
        <h1 class="site-title">清浅资源搜索</h1>
        <p class="site-subtitle">快速找到您需要的信息。无广告，更纯净</p>
        
        <form action="search.html" method="get" class="search-container">
            <input type="text" name="q" class="search-box" placeholder="输入关键词搜索..." autocomplete="off">
            <button type="submit" class="search-button">搜索</button>
        </form>
        
        <div class="footer-links">
            <a href="about.html" class="footer-link">关于我们</a>
        </div>
    </div>

    <!-- 添加用户状态栏 -->
    <div class="user-status">
        <button id="login-button" class="login-button">登录或注册</button>
        <span id="username" class="username" style="display: none;"></span>
    </div>

    <script>
        const clientId = 'YOUR_CLIENT_ID';
        const redirectUri = 'https://yourdomain.com/callback.html';
        const authUrl = `https://github.com/login/oauth/authorize?client_id=${clientId}&redirect_uri=${redirectUri}`;

        const loginButton = document.getElementById('login-button');
        const usernameSpan = document.getElementById('username');

        const token = localStorage.getItem('github_token');
        if (token) {
            loginButton.style.display = 'none';
            usernameSpan.style.display = 'inline';
            // 这里可以调用 API 获取用户名并显示
            fetch('https://api.github.com/user', {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            })
              .then(response => response.json())
              .then(data => {
                    usernameSpan.textContent = data.login;
                });
        } else {
            loginButton.addEventListener('click', () => {
                window.location.href = authUrl;
            });
        }

        // 原有的交互效果
        document.querySelector('.search-box').addEventListener('focus', function() {
            this.placeholder = '';
        });
        
        document.querySelector('.search-box').addEventListener('blur', function() {
            if (!this.value) {
                this.placeholder = '输入关键词搜索...';
            }
        });
    </script>
</body>
</html>
