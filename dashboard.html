<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Security-Policy" 
      content="default-src 'self' https://github.com https://api.github.com;
              script-src 'self' 'unsafe-inline';
              style-src 'self' 'unsafe-inline';
              img-src 'self' https://avatars.githubusercontent.com">
    <title>用户中心</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .profile-card {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            border: 1px solid #eee;
            border-radius: 10px;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <div id="userProfile">加载中...</div>
        <button onclick="logout()" class="logout-btn">退出登录</button>
    </div>

    <script>
        async function loadProfile() {
            const token = sessionStorage.getItem('gh_access_token');
            if (!token) window.location.href = '/login.html';

            try {
                // 获取基础信息
                const userRes = await fetch('https://api.github.com/user', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const userData = await userRes.json();

                // 获取用户档案
                const gistsRes = await fetch(userData.gists_url);
                const profileGist = (await gistsRes.json()).find(g => 
                    g.description === 'user_profile'
                );
                const profileContent = await fetch(profileGist.files['profile.json'].raw_url);
                const profileData = await profileContent.json();

                // 渲染界面
                document.getElementById('userProfile').innerHTML = `
                    <img src="${userData.avatar_url}" class="avatar">
                    <h2>${userData.name || userData.login}</h2>
                    <p>注册时间: ${new Date(profileData.created_at).toLocaleDateString()}</p>
                    <p>最后登录: ${new Date(profileData.last_login).toLocaleString()}</p>
                `;
            } catch (error) {
                window.location.href = '/error.html?code=profile_error';
            }
        }

        function logout() {
            sessionStorage.removeItem('gh_access_token');
            window.location.href = '/';
        }

        // 初始化加载
        loadProfile();
    </script>
</body>
</html>
